name: Build and Deploy C# Function

on:
  push:
    branches:["main"] #se lance quand on push sur main

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
  
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
         dotnet-version: '8.0.x'

      - name: Publish Artifacts
        run: dotnet publish --configuration Release --outpus ./output
      
      # Cette étape échouera tant que vous n'avez pas de secret AZURE_FUNCTIONAPP_PUBLISH_PROFILE'

      - name: Deploy to Azure
        uses: Azure/functions-action@v1
        with:
          app-name: 'NomDeVotreAppAzure' # A remplacer plus tard
          package: './output'
          publish-profile: ${{secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        




